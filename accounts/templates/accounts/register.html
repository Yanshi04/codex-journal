{% extends 'common/base.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="beast-title">Join the school of the Wolf</h1>

    <div class="monster-detail-card" style="max-width: 500px; margin: 0 auto;">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            
            <div class="actions" style="justify-content: center; border: none; margin-top: 20px;">
                <button type="submit" class="btn-submit">Register</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
