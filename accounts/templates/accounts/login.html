{% extends 'common/base.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="beast-title">Welcome to the Path! (Login)</h1>

    <div class="monster-detail-card" style="max-width: 500px; margin: 0 auto;">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            
            <div class="actions" style="justify-content: center; border: none; margin-top: 20px;">
                <button type="submit" class="btn-submit">Log In</button>
            </div>
            
            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                Don't have an account? <a href="{% url 'register' %}" style="color: #8b0000; font-weight: bold;">Sign up here</a>.
            </p>
        </form>
    </div>
</div>
{% endblock %}
