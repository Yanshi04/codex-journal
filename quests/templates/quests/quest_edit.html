{% extends 'common/base.html' %}
{% block content %}
<style>
    .monster-detail-card { text-align: left; }
    form p { display: block; margin-bottom: 20px; }
    form p:has(input[type="checkbox"]) {
        display: flex;
        align-items: center;
    }
    input[type="checkbox"] {
        width: auto !important;
        margin-left: 10px;
    }
</style>

<div class="container mt-5">
    <div class="card p-4 mx-auto shadow" style="max-width: 500px;">
        <h3>Update Contract</h3>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="{% url 'quest_list' %}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>
{% endblock %}
