{% extends 'common/base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>{% if object %}FixUp Weapon{% else %}Add New Weapon{% endif %}</h2>
    
    <div class="card p-4 mt-3">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                {% if object %}Save Changes{% else %}Save Weapon{% endif %}
            </button>

            <a href="{% url 'weapon_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
